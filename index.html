<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAS-T Fab and Finish</title>
  <meta name="description" content="NAS-T Fab and Finish — custom fabrication, laser engraving, and firearm finishing services. Contact us for sales and service.">
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a21;
      --ink: #f2f4f7;
      --muted: #9aa4b2;
      --accent: #d8842f;
      --line: #262c36;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header, main, footer { width: 100%; max-width: 760px; margin: 0 auto; padding: 0 24px; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding-top: 64px;
      padding-bottom: 64px;
    }
    .logo {
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .logo .accent { color: var(--accent); }
    .tagline {
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      margin-top: 14px;
      max-width: 46ch;
    }
    .rule {
      width: 60px;
      height: 3px;
      background: var(--accent);
      border: 0;
      margin: 32px 0;
      border-radius: 2px;
    }
    .services {
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .cta {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .cta-label { color: var(--muted); font-size: 0.9rem; }
    .cta a {
      color: var(--ink);
      text-decoration: none;
      font-size: 1.15rem;
      font-weight: 600;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 2px;
      transition: color 0.15s ease;
    }
    .cta a:hover { color: var(--accent); }
    footer {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding-top: 24px;
      padding-bottom: 24px;
      border-top: 1px solid var(--line);
    }
    .coming {
      display: inline-block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="logo">NAS-T <span class="accent">Fab &amp; Finish</span></h1>
    <p class="tagline">Custom fabrication, laser engraving, and firearm finishing.</p>

    <hr class="rule">

    <p class="services">Fabrication &nbsp;&bull;&nbsp; Engraving &nbsp;&bull;&nbsp; Porting &nbsp;&bull;&nbsp; Finishing</p>

    <div class="cta">
      <span class="cta-label">For sales and service inquiries:</span>
      <a href="mailto:CHANGE_ME@nastfabandfinish.com">Contact Us</a>
    </div>

    <span class="coming">Full site coming soon</span>
  </main>

  <footer>
    &copy; <span id="year"></span> NAS-T Fab and Finish. All rights reserved.
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
